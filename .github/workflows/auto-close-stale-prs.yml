name: Auto Close Stale Pull Requests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # Required for commenting on and closing PRs

jobs:
  close-stale-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Close pull requests open for more than 30 days
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const STALE_DAYS = 30;
            const staleThresholdMs = STALE_DAYS * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const { owner, repo } = context.repo;

            // Includes drafts: pulls.list returns both draft and ready PRs.
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const stalePrs = prs.filter((pr) => {
              const createdAt = new Date(pr.created_at).getTime();
              return now - createdAt >= staleThresholdMs;
            });

            core.info(
              `Found ${stalePrs.length} pull request(s) open for more than ${STALE_DAYS} days.`
            );

            for (const pr of stalePrs) {
              const body = [
                `@${pr.user.login} This pull request has been open for more than ${STALE_DAYS} days and is being closed automatically.`,
                "",
                "If this work is still relevant, feel free to reopen it or open a new pull request. Thank you for your contribution!",
              ].join("\n");

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: "closed",
              });

              core.info(
                `Closed PR #${pr.number} (created at ${pr.created_at}).`
              );
            }
