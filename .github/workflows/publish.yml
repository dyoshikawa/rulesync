name: Publish

on:
  workflow_run:
    workflows: ["Publish Asset"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish draft release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Determine tag from upstream workflow title
        id: tag
        env:
          TITLE: ${{ github.event.workflow_run.display_title }}
        run: |
          TAG=$(echo "$TITLE" | sed -n 's/.*\(v[0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine tag from workflow title: $TITLE"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish draft release
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$TAG" --draft=false
