name: Draft Release

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: "New version without v prefix (e.g. 1.0.0). If empty, determined automatically by semantic versioning rules."
        required: false
        type: string
        default: ""
      model:
        description: "Model abbreviation (codex, glm, kimi). If empty, defaults to glm."
        required: false
        type: string
        default: ""

jobs:
  draft-release:
    if: >-
      github.actor == 'dyoshikawa' ||
      github.actor == 'cm-dyoshikawa'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Configure git
        uses: ./.github/actions/git-config

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Generate rules
        run: pnpm generate

      - name: Select model
        id: select-model
        uses: ./.github/actions/select-opencode-model
        with:
          input-text: ${{ inputs.model }}

      - name: Run OpenCode to draft release
        uses: anomalyco/opencode/github@385cb694419f98103af0e8fc6187ddcbcbb6eecb # v1.15.13
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_NEW_VERSION: ${{ inputs.new_version }}
        with:
          model: ${{ steps.select-model.outputs.model }}
          use_github_token: "true"
          share: false
          prompt: |
            Run the `draft-release` skill. Use the value of the `$INPUT_NEW_VERSION` environment variable as the skill's argument (it may be empty, in which case the skill will determine the new version automatically).
