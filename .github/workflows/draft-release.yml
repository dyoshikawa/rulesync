name: Draft Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read
  id-token: write

concurrency:
  group: draft-release
  cancel-in-progress: false

jobs:
  create-draft-release:
    name: Create draft release after bump PR merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: main
          fetch-depth: 0

      - name: Validate branch and extract version
        id: version
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! echo "$BRANCH_NAME" | grep -qE '^release/v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid branch name: '$BRANCH_NAME'. Must match release/vX.Y.Z"
            exit 1
          fi
          VERSION="${BRANCH_NAME#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v2
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Generate release notes with OpenCode (GLM)
        uses: anomalyco/opencode/github@4d187af9d20b04e4fbd77ad04eaaea241b8e25bf # v1.1.2
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          model: zai-coding-plan/glm-5
          use_github_token: "true"
          share: false
          prompt: |
            Create release notes for version ${VERSION} in natural language.
            Read project commits/changelog context as needed.
            Write markdown release notes to file: ai-tmp/release-notes.md
            Keep notes practical and concise.

      - name: Fallback release notes file (safety)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ai-tmp
          if [ ! -s ai-tmp/release-notes.md ]; then
            echo "## Release v${VERSION}" > ai-tmp/release-notes.md
            echo "" >> ai-tmp/release-notes.md
            echo "Automated draft release generated by workflow." >> ai-tmp/release-notes.md
          fi

      - name: Create draft release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft=true --notes-file ai-tmp/release-notes.md --title "$TAG"
          else
            gh release create "$TAG" --draft --title "$TAG" --notes-file ai-tmp/release-notes.md --target main
          fi
